<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title data-i18n="title">Cờ Tướng</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="app-header">
    <a class="brand" href="#/">
      <span class="brand-mark">將</span>
      <span data-i18n="title"></span>
    </a>

    <div class="header-right">
      <a class="btn btn-ghost btn-sm" href="#/history" id="nav-history" data-i18n="nav_history" hidden>History</a>

      <button type="button" class="lang-toggle" id="lang-toggle"
              aria-label="Toggle language">
        <span class="lang-opt" data-lang="en">EN</span>
        <span class="lang-sep" aria-hidden="true">/</span>
        <span class="lang-opt" data-lang="vi">VI</span>
      </button>

      <nav class="auth-nav" id="auth-loggedout" hidden>
        <a class="btn btn-ghost btn-sm" href="#/login" data-i18n="auth_login">Log in</a>
        <a class="btn btn-primary btn-sm" href="#/register" data-i18n="auth_signup">Sign up</a>
      </nav>

      <div class="menu" id="auth-loggedin" hidden>
        <button type="button" class="avatar" id="auth-avatar" aria-haspopup="menu" aria-expanded="false">
          <span id="auth-avatar-letter">·</span>
        </button>
        <div class="menu-content" id="auth-menu" hidden role="menu">
          <div class="menu-label">
            <span data-i18n="auth_signed_in_as">Signed in as</span>
            <strong id="auth-username">—</strong>
          </div>
          <div class="menu-separator"></div>
          <button type="button" class="menu-item destructive" id="auth-logout">
            <span data-i18n="auth_logout">Log out</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main id="app"></main>

  <script type="module" src="app.js"></script>
</body>

</html>
